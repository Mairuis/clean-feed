<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clean Feed 设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">CF</div>
          <div>
            <h1>Clean Feed</h1>
            <p>还我一个干净的信息流</p>
          </div>
        </div>
        <button id="openConnection" class="secondary-action" type="button">AI 连接</button>
      </header>

      <section class="composer" aria-label="净化偏好">
        <div class="label-row">
          <span>描述你不想再看到的内容</span>
          <span id="connectionState">OpenRouter · Haiku 4.5</span>
        </div>
        <textarea id="userBrief" rows="8" spellcheck="true" placeholder="例如：屏蔽短平快、标题党、低质量娱乐八卦、重复搬运和浪费注意力的内容；保留长视频、教程、深度分析、技术和高质量创作。"></textarea>
        <div class="actionbar">
          <button id="generateConfig" type="button">生成净化方案</button>
          <p id="status" role="status">读取设置中...</p>
        </div>
      </section>

      <section class="status-strip" aria-label="运行状态">
        <div>
          <span>快速规则</span>
          <strong id="rulesCount">-</strong>
        </div>
        <div>
          <span>LLM 后置</span>
          <strong id="aiState">-</strong>
        </div>
        <div>
          <span>平台反馈</span>
          <strong id="feedbackState">自动</strong>
        </div>
      </section>

      <details class="details">
        <summary>查看当前方案</summary>
        <p id="generatedSummary" class="summary">读取设置中...</p>
        <div class="generated-grid">
          <section>
            <h2>快速规则</h2>
            <div id="rulesView" class="rule-list"></div>
          </section>
          <section>
            <h2>LLM 判断策略</h2>
            <p id="reviewerView" class="reviewer-text"></p>
          </section>
        </div>
      </details>
    </main>

    <dialog id="connectionDialog" class="dialog">
      <form method="dialog">
        <div class="dialog-head">
          <div>
            <h2>AI 连接</h2>
            <p>默认使用 OpenRouter 的 Claude Haiku 4.5。</p>
          </div>
          <button id="closeConnection" class="icon-button" type="button" aria-label="关闭">×</button>
        </div>

        <label class="field">
          <span>API Base</span>
          <input id="apiBase" type="url" spellcheck="false" placeholder="https://openrouter.ai/api/v1">
        </label>

        <label class="field">
          <span>Model</span>
          <input id="model" type="text" spellcheck="false" placeholder="anthropic/claude-haiku-4.5">
        </label>

        <label class="field">
          <span>API Key</span>
          <input id="apiKey" type="password" autocomplete="off" spellcheck="false" placeholder="留空则保留已保存的 Key">
        </label>

        <div class="dialog-actions">
          <button id="saveAi" type="button">保存连接</button>
          <button id="testAi" class="secondary-action" type="button">测试</button>
        </div>
      </form>
    </dialog>

    <script src="dist/options.js"></script>
  </body>
</html>
