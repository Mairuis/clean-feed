<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clean Feed 设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="shell" aria-label="Clean Feed 设置">
      <header class="topbar">
        <svg class="mark" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 10v7M22 14l4 6M42 14l-4 6M18 29h28M14 38c7-5 14 5 21 0s11-2 15 0M16 48c7-5 14 5 21 0s10-2 13 0"/>
        </svg>
        <button id="openConnection" class="icon-button" type="button" aria-label="AI 连接" title="AI 连接">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3l1.9 4.3 4.7.4-3.6 3 1.1 4.6-4.1-2.4-4.1 2.4L9 10.7l-3.6-3 4.7-.4L12 3z"/>
            <path d="M19 16v5M16.5 18.5h5"/>
          </svg>
        </button>
      </header>

      <section class="hero" aria-labelledby="pageTitle">
        <p id="connectionState">OpenRouter · Haiku 4.5</p>
        <h1 id="pageTitle">Clean Feed</h1>
      </section>

      <section class="composer" aria-label="净化偏好">
        <label class="sr-only" for="userBrief">描述你不想再看到的内容</label>
        <textarea id="userBrief" rows="6" spellcheck="true" placeholder="少一些短平快，保留深度内容…"></textarea>
        <div class="compose-dock">
          <button id="generateConfig" class="primary-icon" type="button" aria-label="生成净化方案" title="生成净化方案">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 19l10-10M14 4l1.3 3.7L19 9l-3.7 1.3L14 14l-1.3-3.7L9 9l3.7-1.3L14 4z"/>
              <path d="M5 5l1 2.2L8 8l-2 .8L5 11l-1-2.2L2 8l2-.8L5 5zM18 16l.8 1.7 1.7.8-1.7.8L18 21l-.8-1.7-1.7-.8 1.7-.8L18 16z"/>
            </svg>
          </button>
        </div>
      </section>

      <section class="status-strip" aria-label="运行状态">
        <div title="快速规则">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M13 2L4 14h7l-1 8 10-13h-7l1-7z"/>
          </svg>
          <strong id="rulesCount">-</strong>
        </div>
        <div title="LLM 后置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3a7 7 0 0 0-7 7c0 5 7 11 7 11s7-6 7-11a7 7 0 0 0-7-7z"/>
            <path d="M9 10h6M10 13h4"/>
          </svg>
          <strong id="aiState">-</strong>
        </div>
        <div title="平台反馈">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 11v9H4v-9h3zM7 11l4-7h2a2 2 0 0 1 2 2l-.5 4H19a2 2 0 0 1 2.9 2.2l-2 6A2 2 0 0 1 18 20H7"/>
          </svg>
          <strong id="feedbackState">-</strong>
        </div>
      </section>

      <p id="status" class="status-line" role="status">读取设置中...</p>

      <details class="details">
        <summary>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 6h14M5 12h14M5 18h9"/>
          </svg>
          <span>方案</span>
        </summary>
        <p id="generatedSummary" class="summary">读取设置中...</p>
        <div class="generated-grid">
          <section aria-label="快速规则">
            <h2>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M13 2L4 14h7l-1 8 10-13h-7l1-7z"/>
              </svg>
              <span>规则</span>
            </h2>
            <div id="rulesView" class="rule-list"></div>
          </section>
          <section aria-label="LLM 判断策略">
            <h2>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3a7 7 0 0 0-7 7c0 5 7 11 7 11s7-6 7-11a7 7 0 0 0-7-7z"/>
                <path d="M9 10h6M10 13h4"/>
              </svg>
              <span>AI</span>
            </h2>
            <p id="reviewerView" class="reviewer-text"></p>
          </section>
        </div>
      </details>
    </main>

    <dialog id="connectionDialog" class="dialog">
      <form method="dialog">
        <div class="dialog-head">
          <div>
            <h2>AI</h2>
            <p>OpenRouter · Haiku 4.5</p>
          </div>
          <button id="closeConnection" class="icon-button" type="button" aria-label="关闭" title="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12M18 6L6 18"/>
            </svg>
          </button>
        </div>

        <label class="field">
          <span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12h16M12 4v16"/>
            </svg>
            API Base
          </span>
          <input id="apiBase" type="url" spellcheck="false" placeholder="https://openrouter.ai/api/v1">
        </label>

        <label class="field">
          <span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 7h8M8 12h8M8 17h5"/>
            </svg>
            Model
          </span>
          <input id="model" type="text" spellcheck="false" placeholder="anthropic/claude-haiku-4-5">
        </label>

        <label class="field">
          <span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 7a4 4 0 1 0 2 3.5L22 10V7h-3V4h-3l-1 3z"/>
              <path d="M7 13l-3 3"/>
            </svg>
            API Key
          </span>
          <input id="apiKey" type="password" autocomplete="off" spellcheck="false" placeholder="留空则保留已保存的 Key">
        </label>

        <div class="dialog-actions">
          <button id="saveAi" type="button" aria-label="保存连接" title="保存连接">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12l4 4L19 6"/>
            </svg>
            <span>保存</span>
          </button>
          <button id="testAi" class="secondary-action" type="button" aria-label="测试连接" title="测试连接">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v4M12 17v4M4.2 7.5l3.4 2M16.4 14l3.4 2M4.2 16.5l3.4-2M16.4 10l3.4-2"/>
            </svg>
            <span>测试</span>
          </button>
        </div>
      </form>
    </dialog>

    <script src="dist/options.js"></script>
  </body>
</html>
