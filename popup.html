<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clean Feed</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell noise" aria-label="Clean Feed">
      <div class="dawn-bg" aria-hidden="true"></div>
      <section class="popup-content">
        <header class="topbar">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="2"></circle>
              <path d="M12 3c2 2 2 5 0 7-2-2-2-5 0-7zM12 14c2 2 2 5 0 7-2-2-2-5 0-7zM3 12c2-2 5-2 7 0-2 2-5 2-7 0zM14 12c2-2 5-2 7 0-2 2-5 2-7 0z"></path>
            </svg>
          </div>
          <div class="brand-name">Clean Feed</div>

          <nav class="tabbar" aria-label="视图">
            <button class="tab is-active" type="button" data-view="home" aria-label="概览" title="概览">
              <svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"></path></svg>
            </button>
            <button class="tab" type="button" data-view="edit" aria-label="编辑偏好" title="编辑偏好">
              <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            </button>
            <button class="tab" type="button" data-view="plan" aria-label="当前方案" title="当前方案">
              <svg viewBox="0 0 24 24"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z"></path></svg>
            </button>
          </nav>

          <button id="open-options" class="icon-btn" type="button" aria-label="高级设置" title="高级设置">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="2.5"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>

          <label class="switch" title="启用净化">
            <input id="enabled" type="checkbox" aria-label="启用净化">
            <span></span>
          </label>
        </header>

        <section class="view is-active" data-view-panel="home">
          <div class="glass hero-card">
            <div class="hero-line">
              <strong id="rules-count">0</strong>
              <span>条正则规则</span>
              <span id="ai-state" class="llm-pill"><i></i>OFF</span>
            </div>
            <div class="breakdown" aria-hidden="true">
              <span style="width:55%"></span>
              <span style="width:30%"></span>
              <span style="width:15%"></span>
            </div>
            <div class="legend">
              <span>● Regex</span>
              <span>● Feedback</span>
              <span>● Shorts</span>
            </div>
          </div>

          <div class="toggle-stack">
            <label class="toggle-row">
              <svg viewBox="0 0 24 24"><rect x="3" y="6" width="14" height="12" rx="1"></rect><path d="M17 10l4-2v8l-4-2"></path></svg>
              <span>屏蔽短视频</span>
              <input id="shorts-toggle" type="checkbox" aria-label="屏蔽短视频">
            </label>
            <label class="toggle-row">
              <svg viewBox="0 0 24 24"><path d="M7 10v12H3V10h4zM21 11a2 2 0 0 0-2-2h-5.5l1-4a2 2 0 0 0-4-1L7 10v12h11a2 2 0 0 0 2-1.5l2-7a2 2 0 0 0-1-2.5z"></path></svg>
              <span>平台反馈</span>
              <input id="feedback-toggle" type="checkbox" aria-label="平台反馈">
            </label>
          </div>

          <div class="bottom-actions">
            <button id="go-edit" class="btn btn-primary" type="button">
              <svg viewBox="0 0 24 24"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"></path><circle cx="12" cy="12" r="2"></circle></svg>
              改写偏好
            </button>
            <button id="go-plan" class="icon-btn" type="button" aria-label="当前方案" title="当前方案">
              <svg viewBox="0 0 24 24"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z"></path></svg>
            </button>
          </div>
        </section>

        <section class="view" data-view-panel="edit">
          <div class="view-head">
            <span>你想过滤什么</span>
            <small id="brief-count">0 / 300</small>
          </div>
          <textarea id="popupBrief" class="textarea" rows="9" maxlength="300" placeholder="一句话就好…"></textarea>
          <div class="chips" aria-label="快速偏好">
            <button type="button" data-chip="少点娱乐八卦">+ 少点娱乐八卦</button>
            <button type="button" data-chip="保留深度讲解">+ 保留深度讲解</button>
            <button type="button" data-chip="屏蔽游戏解说">+ 屏蔽游戏解说</button>
            <button type="button" data-chip="不看新闻">+ 不看新闻</button>
          </div>
          <button id="popupGenerate" class="btn btn-primary full" type="button">
            <svg viewBox="0 0 24 24"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"></path><circle cx="12" cy="12" r="2"></circle></svg>
            生成净化方案
          </button>
        </section>

        <section class="view" data-view-panel="plan">
          <div class="view-head">
            <span>当前方案</span>
            <small id="plan-count">0 条规则</small>
          </div>
          <div id="plan-list" class="plan-list scroll"></div>
          <button id="open-options-plan" class="btn btn-ghost full" type="button">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.5"></circle><path d="M4 12h2M18 12h2M12 4v2M12 18v2"></path></svg>
            打开高级设置
          </button>
        </section>

        <p id="status" class="status-line" role="status">读取设置中...</p>
      </section>
    </main>
    <script src="dist/popup.js"></script>
  </body>
</html>
