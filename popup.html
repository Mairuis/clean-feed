<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clean Feed</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <svg class="mark" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 10v7M22 14l4 6M42 14l-4 6M18 29h28M14 38c7-5 14 5 21 0s11-2 15 0M16 48c7-5 14 5 21 0s10-2 13 0"/>
        </svg>
        <button id="open-options" class="icon-button" type="button" aria-label="打开设置" title="打开设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
            <path d="M4 12h2M18 12h2M12 4v2M12 18v2M6.3 6.3l1.4 1.4M16.3 16.3l1.4 1.4M17.7 6.3l-1.4 1.4M7.7 16.3l-1.4 1.4"/>
          </svg>
        </button>
      </header>

      <section class="hero" aria-labelledby="popupTitle">
        <h1 id="popupTitle">Clean Feed</h1>
        <p id="enabled-label">读取设置中...</p>
      </section>

      <section class="control-strip" aria-label="状态">
        <label class="power" title="启用净化">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v9M6.4 6.4a8 8 0 1 0 11.2 0"/>
          </svg>
          <input id="enabled" type="checkbox">
        </label>

        <div class="metric" title="程序化规则">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M13 2L4 14h7l-1 8 10-13h-7l1-7z"/>
          </svg>
          <strong id="rules-count">-</strong>
        </div>

        <div class="metric" title="AI 后置判断">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3a7 7 0 0 0-7 7c0 5 7 11 7 11s7-6 7-11a7 7 0 0 0-7-7z"/>
            <path d="M9 10h6M10 13h4"/>
          </svg>
          <strong id="ai-state">-</strong>
        </div>
      </section>

      <p id="status" class="status-line" role="status">读取设置中...</p>
    </main>
    <script src="dist/popup.js"></script>
  </body>
</html>
